version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: fe-lnf-db-dev
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lnf}
      POSTGRES_USER: ${POSTGRES_USER:-lnf}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lnf_password}
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lnf}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-dev-data:
    driver: local

spring.application.name=fe-lnf

# Testcontainers will override datasource settings automatically
# Flyway Configuration for tests
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Use system temp directory for test uploads
app.upload.dir=${java.io.tmpdir}/lnf-test-uploads
app.upload.max-size=10485760
app.upload.target-size=512000

spring.application.name=fe-lnf

# PostgreSQL Database Configuration (default for local development)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/lnf}
spring.datasource.username=${DATABASE_USERNAME:lnf}
spring.datasource.password=${DATABASE_PASSWORD:lnf_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=${UPLOAD_DIR:./uploads}
app.upload.max-size=10485760
app.upload.target-size=512000

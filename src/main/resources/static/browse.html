<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Browse Items - Lost & Found</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>🔍</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        button, a, input, select, textarea {
            touch-action: manipulation;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }
        h1 {
            color: white;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        .nav-link {
            background: white;
            color: #667eea;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .nav-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255,255,255,0.3);
        }
        .form-card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .form-card h2 {
            margin-bottom: 20px;
            color: #333;
        }
        .filters {
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }
        .filter-label {
            font-weight: 600;
            color: #333;
            margin-right: 5px;
        }
        .filter-option {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .filter-option input[type="checkbox"] {
            width: auto;
            cursor: pointer;
        }
        .filter-option label {
            cursor: pointer;
            margin: 0;
            font-weight: normal;
        }
        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .item-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.2s, box-shadow 0.2s, opacity 0.3s, background-color 0.3s;
        }
        .item-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }
        .item-card.deleted {
            background: #f5f5f5;
            opacity: 0.6;
        }
        .item-card.deleted:hover {
            transform: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .item-card.deleted h3 {
            text-decoration: line-through;
            color: #999;
        }
        .item-card.deleted .item-actions {
            display: none;
        }
        .item-image {
            width: 100%;
            height: 200px;
            object-fit: contain;
            border-radius: 8px;
            margin-bottom: 15px;
            background: #f5f5f5;
        }
        .item-card h3 {
            color: #333;
            margin-bottom: 10px;
        }
        .item-card p {
            color: #666;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }
        .status-FOUND {
            background: #ffe;
            color: #c93;
        }
        .status-CLAIMED {
            background: #eef;
            color: #33c;
        }
        .status-RETURNED {
            background: #efe;
            color: #3c3;
        }
        .item-actions {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }
        .item-actions button {
            flex: 1;
            padding: 8px;
            font-size: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .item-actions button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        .delete-btn {
            background: #dc3545 !important;
        }
        .delete-btn:hover {
            box-shadow: 0 5px 15px rgba(220, 53, 69, 0.4) !important;
        }
        .empty-state {
            text-align: center;
            color: #999;
            padding: 40px;
            font-size: 18px;
        }
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            gap: 20px;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #e0e0e0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .loading-text {
            color: #666;
            font-size: 16px;
        }
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }
        .pagination button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .pagination button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        .pagination button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }
        .pagination .page-info {
            color: #666;
            font-size: 14px;
            margin: 0 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 Browse Items</h1>
            <a href="/" class="nav-link">Report Found Item</a>
        </div>

        <div class="form-card">
            <h2>All Items</h2>
            <p style="color: #666; margin-bottom: 20px;">Browse all reported items and their current status.</p>
            <div class="filters">
                <span class="filter-label">Filter by status:</span>
                <div class="filter-option">
                    <input type="checkbox" id="filterFound" value="FOUND" checked>
                    <label for="filterFound">Found</label>
                </div>
                <div class="filter-option">
                    <input type="checkbox" id="filterClaimed" value="CLAIMED" checked>
                    <label for="filterClaimed">Claimed</label>
                </div>
                <div class="filter-option">
                    <input type="checkbox" id="filterReturned" value="RETURNED" checked>
                    <label for="filterReturned">Returned</label>
                </div>
            </div>
            <div id="loading" class="loading">
                <div class="spinner"></div>
                <div class="loading-text">Loading items...</div>
            </div>
            <div id="itemsList" class="items-grid" style="display: none;"></div>
            <div id="pagination" class="pagination" style="display: none;">
                <button id="prevPage">Previous</button>
                <span class="page-info">
                    Page <span id="currentPage">1</span> of <span id="totalPages">1</span>
                </span>
                <button id="nextPage">Next</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '/api/items';
        let currentPage = 0;
        let totalPages = 0;
        const deletedItems = new Set();

        async function loadItems(page = 0) {
            const loadingEl = document.getElementById('loading');
            const itemsListEl = document.getElementById('itemsList');
            const paginationEl = document.getElementById('pagination');

            try {
                // Show loading state
                loadingEl.style.display = 'flex';
                itemsListEl.style.display = 'none';
                paginationEl.style.display = 'none';

                // Get selected filters
                const selectedStatuses = [];
                if (document.getElementById('filterFound').checked) selectedStatuses.push('FOUND');
                if (document.getElementById('filterClaimed').checked) selectedStatuses.push('CLAIMED');
                if (document.getElementById('filterReturned').checked) selectedStatuses.push('RETURNED');

                // Build URL with status filters and pagination
                let url = `${API_URL}?page=${page}&size=20`;
                if (selectedStatuses.length > 0 && selectedStatuses.length < 3) {
                    url += '&' + selectedStatuses.map(s => `status=${s}`).join('&');
                }

                const response = await fetch(url);
                const data = await response.json();

                currentPage = data.number;
                totalPages = data.totalPages;

                displayItems(data.content);
                updatePagination(data);

                // Hide loading, show content
                loadingEl.style.display = 'none';
                itemsListEl.style.display = 'grid';
            } catch (error) {
                console.error('Error loading items:', error);
                loadingEl.style.display = 'none';
                itemsListEl.style.display = 'grid';
                itemsListEl.innerHTML = '<div class="empty-state">Error loading items. Please try again.</div>';
            }
        }

        function displayItems(items) {
            const container = document.getElementById('itemsList');

            // Filter out deleted items
            const visibleItems = items.filter(item => !deletedItems.has(item.id));

            if (visibleItems.length === 0) {
                container.innerHTML = '<div class="empty-state" style="grid-column: 1/-1;">No items found.</div>';
                return;
            }

            container.innerHTML = visibleItems.map(item => `
                <div class="item-card" data-item-id="${item.id}">
                    ${item.imagePath ? `<img src="/api/items/images/${item.imagePath}" class="item-image" alt="${escapeHtml(item.name)}">` : ''}
                    <h3>${escapeHtml(item.name)}</h3>
                    <p><strong>Status:</strong> <span class="status-badge status-${item.status}" data-status="${item.status}">${item.status}</span></p>
                    ${item.description ? `<p><strong>Description:</strong> ${escapeHtml(item.description)}</p>` : ''}
                    ${item.location ? `<p><strong>Location:</strong> ${escapeHtml(item.location)}</p>` : ''}
                    <p><strong>Reported:</strong> ${new Date(item.createdAt).toLocaleDateString()}</p>
                    <div class="item-actions">
                        <button onclick="updateStatus(${item.id})">Change Status</button>
                        <button class="delete-btn" onclick="deleteItem(${item.id})">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        function updatePagination(pageData) {
            const paginationDiv = document.getElementById('pagination');
            const prevBtn = document.getElementById('prevPage');
            const nextBtn = document.getElementById('nextPage');
            const currentPageSpan = document.getElementById('currentPage');
            const totalPagesSpan = document.getElementById('totalPages');

            if (pageData.totalPages <= 1) {
                paginationDiv.style.display = 'none';
                return;
            }

            paginationDiv.style.display = 'flex';
            currentPageSpan.textContent = pageData.number + 1;
            totalPagesSpan.textContent = pageData.totalPages;

            prevBtn.disabled = pageData.first;
            nextBtn.disabled = pageData.last;
        }

        async function updateStatus(id) {
            const card = document.querySelector(`[data-item-id="${id}"]`);
            if (!card) return;

            const statusBadge = card.querySelector('.status-badge');
            const currentStatus = statusBadge.dataset.status;
            const button = card.querySelector('.item-actions button');

            const statuses = ['FOUND', 'CLAIMED', 'RETURNED'];
            const currentIndex = statuses.indexOf(currentStatus);
            const newStatus = statuses[(currentIndex + 1) % statuses.length];

            const originalButtonText = button.textContent;

            try {
                // Disable button and show loading
                button.disabled = true;
                button.textContent = 'Updating...';

                // Optimistic update
                statusBadge.textContent = newStatus;
                statusBadge.dataset.status = newStatus;
                statusBadge.className = `status-badge status-${newStatus}`;

                const formData = new FormData();
                formData.append('status', newStatus);

                const response = await fetch(`${API_URL}/${id}`, {
                    method: 'PUT',
                    body: formData
                });

                if (!response.ok) {
                    throw new Error('Failed to update');
                }
            } catch (error) {
                console.error('Error updating item:', error);
                // Revert on error
                statusBadge.textContent = currentStatus;
                statusBadge.dataset.status = currentStatus;
                statusBadge.className = `status-badge status-${currentStatus}`;
                alert('Failed to update item');
            } finally {
                button.disabled = false;
                button.textContent = originalButtonText;
            }
        }

        async function deleteItem(id) {
            if (!confirm('Are you sure you want to delete this item?')) return;

            const card = document.querySelector(`[data-item-id="${id}"]`);
            if (!card) return;

            try {
                // Mark as deleted visually
                card.classList.add('deleted');
                deletedItems.add(id);

                // Delete on server
                const response = await fetch(`${API_URL}/${id}`, {
                    method: 'DELETE'
                });

                if (!response.ok) {
                    throw new Error('Failed to delete');
                }
            } catch (error) {
                console.error('Error deleting item:', error);
                // Revert on error
                card.classList.remove('deleted');
                deletedItems.delete(id);
                alert('Failed to delete item');
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Add filter change listeners (reset to page 0)
        document.getElementById('filterFound').addEventListener('change', () => loadItems(0));
        document.getElementById('filterClaimed').addEventListener('change', () => loadItems(0));
        document.getElementById('filterReturned').addEventListener('change', () => loadItems(0));

        // Add pagination button listeners
        document.getElementById('prevPage').addEventListener('click', () => {
            if (currentPage > 0) {
                loadItems(currentPage - 1);
            }
        });

        document.getElementById('nextPage').addEventListener('click', () => {
            if (currentPage < totalPages - 1) {
                loadItems(currentPage + 1);
            }
        });

        loadItems();
    </script>
</body>
</html>

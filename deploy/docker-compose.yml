version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: fe-lnf-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lnf}
      POSTGRES_USER: ${POSTGRES_USER:-lnf}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lnf}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    # Replace 'toxoed' with your Docker Hub username
    image: toxoed/fe-lnf:latest
    container_name: fe-lnf-app
    ports:
      - "80:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DATABASE_URL=jdbc:postgresql://db:5432/${POSTGRES_DB:-lnf}
      - DATABASE_USERNAME=${POSTGRES_USER:-lnf}
      - DATABASE_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - ./uploads:/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

# Volumes section removed - using bind mount instead
